version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: real-vs-ai-detector
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=false
      - SECRET_KEY=change-this-in-production
      - MAX_UPLOAD_SIZE=16777216
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./model:/app/model
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
