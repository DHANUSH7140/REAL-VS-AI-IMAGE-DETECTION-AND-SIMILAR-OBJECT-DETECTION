<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionProbe — AI Image Detection</title>
  <meta name="description" content="Detect AI-generated images using state-of-the-art vision models.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">VisionProbe</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" 
              aria-label="Toggle light/dark mode">
        <span id="theme-icon">◑</span>
      </button>
    </div>
  </nav>

  <!-- PAGE: AI DETECTOR -->
  <section id="page-detect" class="page-section active">
    <div class="page-header">
      <h1>AI vs Real Image Detector</h1>
      <p class="subtitle">4-branch feature extraction + XGBoost classifier for AI forensic detection</p>
    </div>
    <div class="two-panel">
      <!-- LEFT: Upload + trigger -->
      <div class="panel-left" id="detect-upload-panel">
        <div class="upload-zone" id="detect-drop-zone">
          <div class="upload-icon">⬆</div>
          <p class="upload-title">Drop image here</p>
          <p class="upload-sub">or click to browse · paste Ctrl+V · enter URL</p>
          <input type="file" id="detect-file-input" accept="image/*" hidden>
        </div>
        <div class="url-input-row">
          <input type="text" id="detect-url-input" placeholder="Paste image URL...">
          <button onclick="loadFromURL('detect')">Load</button>
        </div>
        <div id="detect-preview-area" class="preview-area hidden">
          <img id="detect-preview-img" alt="Preview">
          <div class="preview-meta" id="detect-meta"></div>
        </div>
        <div class="settings-group">
          <label class="toggle-label">
            <input type="checkbox" id="include-gradcam" checked>
            Include GradCAM heatmap
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="include-shap" checked>
            Include feature importance
          </label>
        </div>
        <button class="btn-primary btn-full" id="detect-btn" 
                onclick="runDetection()" disabled>
          Analyze Image
        </button>
        <div class="progress-panel hidden" id="detect-progress">
          <!-- Steps filled by JS -->
        </div>
      </div>
      <!-- RIGHT: Results -->
      <div class="panel-right hidden" id="detect-results-panel">
        <!-- Filled by results.js -->
        <div id="detect-verdict-banner"></div>
        <div id="detect-score-grid" class="score-grid"></div>
        <div class="card reasoning-card">
          <h3>Analysis reasoning</h3>
          <ul class="reasoning-list" id="detect-reasoning"></ul>
        </div>
      </div>
    </div>

    <!-- Detailed Analysis -->
    <div class="detail-section hidden" id="detect-detail">
      <div class="detail-tabs">
        <button class="detail-tab active" data-tab="heatmap" onclick="switchDetectTab('heatmap')">Heatmap</button>
        <button class="detail-tab" data-tab="frequency" onclick="switchDetectTab('frequency')">Frequency</button>
        <button class="detail-tab" data-tab="shap" onclick="switchDetectTab('shap')">Feature importances</button>
        <button class="detail-tab" data-tab="models" onclick="switchDetectTab('models')">Model branches</button>
        <button class="detail-tab" data-tab="raw" onclick="switchDetectTab('raw')">Raw data</button>
      </div>
      <div class="detail-content" id="detect-detail-content">
        <!-- Filled by charts.js -->
      </div>
    </div>
  </section>

  <!-- CDN Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
  
  <!-- App Scripts -->
  <script src="js/api.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/detector/charts.js"></script>
  <script src="js/detector/results.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
